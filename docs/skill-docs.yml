schema_version: 1
description: >
  Skill 文档集成的唯一登记入口。当 skill 内与文档相关的文件变化时，
  需要复核生成站点骨架或 skill 自有文档 manifest，并刷新
  docs_review.source_fingerprint。
skills:
  gh-issue-comment-monitor:
    path: skills/gh-issue-comment-monitor
    mount: docs/skills/gh-issue-comment-monitor
    status: bootstrap
    publish:
      mode: subrepo-manifest
      entry: docs/skills/gh-issue-comment-monitor/index.md
      skill_manifest: docs.manifest.yml
    docs_review:
      source_fingerprint: sha256:53fac663b0261599be806c892b318f308ba6b1a6be4af5267da0bf3583045317
      reviewed_at: "2026-06-05"
